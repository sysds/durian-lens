worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent"';

  access_log /var/log/nginx/access.log main;
  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 20M;

  # ── Rate limiting zones ───────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
  limit_req_zone $binary_remote_addr zone=scan_limit:10m rate=10r/m;

  # Docker embedded DNS resolver for dynamic upstream resolution
  resolver 127.0.0.11 valid=30s;

  server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # Health check (no rate limit)
    location /api/v1/health {
      set $api_backend api:3000;
      proxy_pass http://$api_backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Scan endpoint — stricter rate limit
    location /api/v1/scan {
      limit_req zone=scan_limit burst=5 nodelay;
      limit_req_status 429;

      set $api_backend api:3000;
      proxy_pass http://$api_backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 60s;
    }

    # All other API routes
    location /api/ {
      limit_req zone=api_limit burst=20 nodelay;
      limit_req_status 429;

      set $api_backend api:3000;
      proxy_pass http://$api_backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
    }
  }
}